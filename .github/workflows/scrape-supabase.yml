name: Scheduled Scrape (Supabase)

on:
  schedule:
    # Run daily at 9 AM UTC (3 AM Central)
    - cron: '0 9 * * *'
  workflow_dispatch:  # Manual trigger button
    inputs:
      scraper:
        description: 'Scraper to run (leave empty for all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - theslowdown
          - waitingroom
          - reverblounge
          - bourbontheatre
          - admiral
          - astrotheater
          - steelhouse
          - other

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: |
          cd scraper
          pip install -r requirements.txt
          pip install supabase
          playwright install chromium

      - name: Run scrapers
        id: scrape
        continue-on-error: true
        run: |
          cd scraper
          if [ -n "${{ inputs.scraper }}" ]; then
            echo "Running single scraper: ${{ inputs.scraper }}"
            python -c "
import os, sys
sys.path.insert(0, '.')
from supabase import create_client
from config import SCRAPERS
from datetime import datetime, timezone, date

supabase = create_client(os.environ['SUPABASE_URL'], os.environ['SUPABASE_SERVICE_KEY'])
scraper = next((s for s in SCRAPERS if s.id == '${{ inputs.scraper }}'), None)
if not scraper:
    print('Unknown scraper: ${{ inputs.scraper }}')
    sys.exit(1)

COMPARE_FIELDS = ['title', 'date', 'time', 'event_url', 'ticket_url', 'image_url', 'price', 'age_restriction', 'supporting_artists']

print(f'Running {scraper.name}...')
try:
    events = scraper.scrape()
    today = date.today().isoformat()
    future_events = [e for e in events if e.date >= today]
    now = datetime.now(timezone.utc).isoformat()
    new_ids, changed_ids = [], []
    for e in future_events:
        data = {
            'id': e.id, 'title': e.title, 'date': e.date, 'time': e.time,
            'venue_id': scraper.id, 'event_url': e.eventUrl, 'ticket_url': e.ticketUrl,
            'image_url': e.imageUrl, 'price': e.price, 'age_restriction': e.ageRestriction,
            'supporting_artists': e.supportingArtists, 'source': scraper.id,
            'status': 'approved',
        }
        existing = supabase.table('events').select('*').eq('id', e.id).execute()
        if existing.data:
            old = existing.data[0]
            has_changes = any(old.get(f) != data.get(f) for f in COMPARE_FIELDS)
            if has_changes:
                data['added_at'] = old['added_at']
                data['updated_at'] = now
                supabase.table('events').update(data).eq('id', e.id).execute()
                changed_ids.append(e.id)
        else:
            data['added_at'] = now
            data['updated_at'] = now
            supabase.table('events').insert(data).execute()
            new_ids.append(e.id)
    supabase.table('scraper_runs').insert({
        'scraper_id': scraper.id, 'scraper_name': scraper.name,
        'status': 'success', 'event_count': len(future_events),
        'new_count': len(new_ids), 'changed_count': len(changed_ids),
        'new_event_ids': new_ids, 'changed_event_ids': changed_ids,
        'started_at': now, 'finished_at': now
    }).execute()
    print(f'Success: {len(future_events)} events ({len(new_ids)} new, {len(changed_ids)} changed)')
except Exception as ex:
    now = datetime.now(timezone.utc).isoformat()
    supabase.table('scraper_runs').insert({
        'scraper_id': scraper.id, 'scraper_name': scraper.name,
        'status': 'error', 'event_count': 0,
        'new_count': 0, 'changed_count': 0,
        'new_event_ids': [], 'changed_event_ids': [],
        'error_message': str(ex),
        'started_at': now, 'finished_at': now
    }).execute()
    print(f'Error: {ex}')
    sys.exit(1)
" 2>&1 | tee scrape_output.txt
          else
            echo "Running all scrapers..."
            python run_scrape_supabase.py 2>&1 | tee scrape_output.txt
          fi
          exit_code=$?
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
          exit $exit_code

      - name: Create job summary
        if: always()
        run: |
          echo "## Scraper Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ inputs.scraper }}" ]; then
            echo "**Scraper:** ${{ inputs.scraper }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Scraper:** All" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat scraper/scrape_output.txt >> $GITHUB_STEP_SUMMARY || echo "No output captured" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Check for failures
        if: steps.scrape.outputs.exit_code != '0'
        run: |
          echo "::error::One or more scrapers failed. Check the summary above."
          exit 1
