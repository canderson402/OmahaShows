name: Scheduled Scrape (Supabase)

on:
  schedule:
    # Run twice daily: 9 AM and 6 PM UTC (3 AM and 12 PM Central)
    - cron: '0 9 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      scraper:
        description: 'Scraper to run (leave empty for all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - theslowdown
          - waitingroom
          - reverblounge
          - bourbontheatre
          - admiral
          - astrotheater
          - steelhouse
          - other

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: |
          cd scraper
          pip install -r requirements.txt
          pip install supabase
          playwright install chromium

      - name: Run scrapers
        id: scrape
        continue-on-error: true
        run: |
          cd scraper
          python run_scrape_supabase.py ${{ inputs.scraper || 'all' }} 2>&1 | tee scrape_output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Create job summary
        if: always()
        run: |
          echo "## Scraper Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Scraper:** ${{ inputs.scraper || 'all' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat scraper/scrape_output.txt >> $GITHUB_STEP_SUMMARY || echo "No output captured" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check for failures
        if: steps.scrape.outputs.exit_code != '0'
        run: |
          echo "::error::One or more scrapers failed. Check the summary above."
          exit 1
