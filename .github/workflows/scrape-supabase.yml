name: Scheduled Scrape (Supabase)

on:
  schedule:
    # Run daily at 8 AM UTC (3 AM Central Daylight Time)
    - cron: '0 8 * * *'
  workflow_dispatch:  # Manual trigger button
    inputs:
      scraper:
        description: 'Scraper to run (leave empty for all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - theslowdown
          - waitingroom
          - reverblounge
          - bourbontheatre
          - admiral
          - astrotheater
          - steelhouse
          - holland
          - orpheum
          - baxterarena
          - stircove
          - thesydney
          - other
          - ohmyomaha
          - ticketmaster

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: |
          cd scraper
          pip install -r requirements.txt
          pip install supabase
          playwright install chromium

      - name: Run scrapers
        id: scrape
        continue-on-error: true
        env:
          SCRAPER_ID: ${{ inputs.scraper }}
        run: |
          set -o pipefail
          cd scraper
          if [ -n "$SCRAPER_ID" ]; then
            echo "Running single scraper: $SCRAPER_ID"
            python run_single_scraper.py 2>&1 | tee scrape_output.txt
          else
            echo "Running all scrapers..."
            python run_scrape_supabase.py 2>&1 | tee scrape_output.txt
          fi
          exit_code=$?
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
          exit $exit_code

      - name: Create job summary
        if: always()
        run: |
          echo "## Scraper Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ inputs.scraper }}" ]; then
            echo "**Scraper:** ${{ inputs.scraper }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Scraper:** All" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat scraper/scrape_output.txt >> $GITHUB_STEP_SUMMARY || echo "No output captured" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Check for failures
        if: steps.scrape.outputs.exit_code != '0'
        run: |
          echo "::error::One or more scrapers failed. Check the summary above."
          exit 1
